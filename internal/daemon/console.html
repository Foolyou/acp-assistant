<html lang="en">

  <title>ACPA Console</title>
  <style>:root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;--bg: #f5f7fa;--surface: #ffffff;--surface-2: #eef3f8;--ink: #17202a;--muted: #637083;--line: #d8e0ea;--line-strong: #b9c5d3;--ok: #13795b;--ok-bg: #e7f6ee;--warn: #9a6700;--warn-bg: #fff4d6;--bad: #b42318;--bad-bg: #ffe8e5;--accent: #145c72;--accent-bg: #e2f3f7;--shadow: 0 20px 50px rgba(23, 32, 42, .16);--radius: 8px}*{box-sizing:border-box}html,body,#root{min-height:100%}body{margin:0;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}button{min-height:40px;border:1px solid var(--line-strong);border-radius:7px;background:var(--surface);color:var(--ink);padding:8px 12px;cursor:pointer}button:disabled{opacity:.6;cursor:not-allowed}button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid rgba(20,92,114,.28);outline-offset:2px}input,select{width:100%;min-height:42px;border:1px solid var(--line-strong);border-radius:7px;background:var(--surface);color:var(--ink);padding:8px 10px}label{display:grid;gap:6px;color:#334155;font-size:13px;font-weight:600}.app-shell{min-height:100vh;padding-bottom:84px}.app-bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px 10px;background:#f5f7faf0;backdrop-filter:blur(14px);border-bottom:1px solid rgba(216,224,234,.8)}.app-bar h1,h2,h3,p{margin:0}.app-bar h1{font-size:22px;line-height:1.15;letter-spacing:0}.eyebrow{font-size:12px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0}.icon-button{width:42px;padding:0;font-size:20px}.layout{display:grid;gap:16px;padding:14px;max-width:1180px;margin:0 auto}.dashboard{display:grid;gap:14px;min-width:0}.health-strip,.attention,.assistant-card,.empty-state,.detail-card,.alert{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}.health-strip{display:grid;gap:14px;padding:14px;border-left:4px solid var
