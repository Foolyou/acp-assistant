<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACPA Console</title>
  <style>:root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;--bg: #f5f7fa;--surface: #ffffff;--surface-2: #eef3f8;--ink: #17202a;--muted: #637083;--line: #d8e0ea;--line-strong: #b9c5d3;--ok: #13795b;--ok-bg: #e7f6ee;--warn: #9a6700;--warn-bg: #fff4d6;--bad: #b42318;--bad-bg: #ffe8e5;--accent: #145c72;--accent-bg: #e2f3f7;--shadow: 0 20px 50px rgba(23, 32, 42, .16);--radius: 8px}*{box-sizing:border-box}html,body,#root{min-height:100%}body{margin:0;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}button{min-height:40px;border:1px solid var(--line-strong);border-radius:7px;background:var(--surface);color:var(--ink);padding:8px 12px;cursor:pointer}button:disabled{opacity:.6;cursor:not-allowed}button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid rgba(20,92,114,.28);outline-offset:2px}input,select{width:100%;min-height:42px;border:1px solid var(--line-strong);border-radius:7px;background:var(--surface);color:var(--ink);padding:8px 10px}label{display:grid;gap:6px;color:#334155;font-size:13px;font-weight:600}.app-shell{min-height:100vh;padding-bottom:84px}.app-bar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px 10px;background:#f5f7faf0;backdrop-filter:blur(14px);border-bottom:1px solid rgba(216,224,234,.8)}.app-bar h1,h2,h3,p{margin:0}.app-bar h1{font-size:22px;line-height:1.15;letter-spacing:0}.eyebrow{font-size:12px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:0}.icon-button{width:42px;padding:0;font-size:20px}.layout{display:grid;gap:16px;padding:14px;max-width:1180px;margin:0 auto}.dashboard{display:grid;gap:14px;min-width:0}.health-strip,.attention,.assistant-card,.empty-state,.detail-card,.alert{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius)}.health-strip{display:grid;gap:14px;padding:14px;border-left:4px solid var(--accent)}.health-strip.ok{border-left-color:var(--ok)}.health-strip.warn{border-left-color:var(--warn)}.health-strip.bad{border-left-color:var(--bad)}.health-strip strong{display:inline-flex;align-items:center;gap:8px}.health-strip p{color:var(--muted);margin-top:4px;overflow-wrap:anywhere}.health-metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px}.health-metrics span{display:grid;gap:2px;padding:10px;background:var(--surface-2);border-radius:7px}.health-metrics small{color:var(--muted)}.status-dot{width:9px;height:9px;border-radius:999px;display:inline-block;background:var(--accent)}.status-dot.ok{background:var(--ok)}.status-dot.warn{background:var(--warn)}.status-dot.bad{background:var(--bad)}.alert{display:grid;gap:4px;padding:12px}.alert.ok{background:var(--ok-bg);border-color:#b7e4cc}.alert.warn{background:var(--warn-bg);border-color:#f3d37a}.alert.bad{background:var(--bad-bg);border-color:#ffb8b0}.alert span{color:#334155;overflow-wrap:anywhere}.attention{display:grid;gap:10px;padding:13px;background:var(--warn-bg);border-color:#f3d37a}.attention h2,.section-head h2{font-size:17px}.attention p,.section-head p{color:var(--muted);font-size:13px;margin-top:3px}.attention-list{display:grid;gap:8px}.attention-list button{display:grid;gap:2px;text-align:left;background:#ffffffb3}.attention-list small{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.section-head{display:flex;justify-content:space-between;align-items:end;gap:14px;margin-top:4px}.primary{background:var(--accent);border-color:var(--accent);color:#fff}.danger{background:var(--bad);border-color:var(--bad);color:#fff}.wide{width:100%}.link-button{border:0;background:transparent;color:var(--accent);padding-inline:0;justify-self:start}.card-grid{display:grid;gap:12px}.assistant-card{display:grid;gap:13px;padding:14px;cursor:pointer}.assistant-card.active{border-color:#145c727a;box-shadow:0 0 0 3px #145c7214}.card-top{display:flex;align-items:start;justify-content:space
